<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    #result {
      margin-top: 20px;
      font-size: 0.85em;
    }
    .list-group-item {
      padding: 0.5rem 1rem;
    }
    .doi {
      font-size: 0.75em;
    }
    .status {
      float: right;
    }
    footer {
      margin-top: 30px;
      text-align: center;
      font-size: 0.8em;
    }
    .btn-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>
<body>
  <h1 class="h4">Zotero DOI PDF Finder</h1>
  <div id="error" class="alert alert-danger mt-3 d-none"></div> <!-- Updated this line -->
  <div class="form-group">
    <label for="collectionsDropdown">Select Collection:</label>
    <select id="collectionsDropdown" class="form-control">
      <option value="">Select a collection</option>
    </select>
  </div>
  <div class="form-group">
    <label for="tagFilter">Tag Filter:</label>
    <input type="text" id="tagFilter" class="form-control">
  </div>
  <div class="form-group">
    <label for="excludeJournals">Exclude Journals (comma-separated):</label>
    <input type="text" id="excludeJournals" class="form-control">
  </div>
  <div class="form-group row">
    <div class="col-6">
      <label for="pageInput">Page:</label>
      <input type="number" id="pageInput" class="form-control form-control-sm" value="1" min="1">
    </div>
    <div class="col-6">
      <label for="itemsPerPageInput">Items Per Page:</label>
      <input type="number" id="itemsPerPageInput" class="form-control form-control-sm" value="10" min="1">
    </div>
  </div>
  <div class="form-group form-check">
    <input type="checkbox" class="form-check-input" id="springerSwitch">
    <label class="form-check-label" for="springerSwitch">Springer DOI Detection</label>
  </div>
  <div class="form-group form-check">
    <input type="checkbox" class="form-check-input" id="debugMode">
    <label class="form-check-label" for="debugMode">Debug Mode</label>
  </div>
  <div class="btn-group">
    <button id="fetchItems" class="btn btn-primary">Fetch Items</button>
    <button id="startProcess" class="btn btn-secondary" disabled>Start</button>
    <button id="stopProcess" class="btn btn-secondary" disabled>Stop</button>
  </div>
  <ul id="result" class="list-group"></ul>

  <div id="status" class="mt-3"></div>
  <div id="debugInfo" class="mt-3"></div>

  <footer>
    <small>Created by Dr. LJ Janse van Rensburg<br>
    <a href="https://drzagger.com/">https://drzagger.com/</a><br>
    &copy; 2024</small>
    <div id="version" class="mt-2"></div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
